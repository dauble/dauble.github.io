name: Publish Scheduled Posts

# Runs every day at 09:00 UTC (05:00 ET / 04:00 CT)
# Also triggerable manually from the Actions tab with an optional date override.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      publish_date:
        description: "Publish date override (YYYY-MM-DD). Defaults to today."
        required: false
        default: ""

permissions:
  contents: write   # required to commit and push the moved post files

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the full history so git operations are clean
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Resolve publish date
        id: resolve_date
        run: |
          if [ -n "${{ github.event.inputs.publish_date }}" ]; then
            echo "date=${{ github.event.inputs.publish_date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Move scheduled drafts to _posts
        id: publish
        run: |
          python3 scripts/publish-drafts.py "${{ steps.resolve_date.outputs.date }}" \
            | tee /tmp/publish-output.txt

          # Signal downstream steps whether anything was actually moved
          if grep -q "^PUBLISHED:" /tmp/publish-output.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push published posts
        if: steps.publish.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ _drafts/
          git commit -m "chore: publish scheduled posts for ${{ steps.resolve_date.outputs.date }}"
          git push

      - name: Summary
        run: |
          echo "### Publish run: ${{ steps.resolve_date.outputs.date }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/publish-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
