name: Publish Scheduled Posts

# Runs every day at 09:00 UTC (05:00 ET / 04:00 CT)
# Also triggerable manually from the Actions tab with an optional date override.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      publish_date:
        description: "Publish date override (YYYY-MM-DD). Defaults to today."
        required: false
        default: ""

permissions:
  contents: write      # required to commit changed files to a PR branch
  pull-requests: write # required to open the PR

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the full history so git operations are clean
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Resolve publish date
        id: resolve_date
        run: |
          if [ -n "${{ github.event.inputs.publish_date }}" ]; then
            echo "date=${{ github.event.inputs.publish_date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Move scheduled drafts to _posts
        id: publish
        run: |
          set -o pipefail
          python3 scripts/publish-drafts.py "${{ steps.resolve_date.outputs.date }}" \
            | tee /tmp/publish-output.txt

          # Signal downstream steps whether anything was actually moved
          if grep -q "^PUBLISHED:" /tmp/publish-output.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request for published posts
        id: create_pr
        if: steps.publish.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ github.token }}
          branch: published-posts-${{ github.run_id }}
          base: master
          title: "chore: publish scheduled posts for ${{ steps.resolve_date.outputs.date }}"
          commit-message: "chore: publish scheduled posts for ${{ steps.resolve_date.outputs.date }}"
          body: |
            This automated pull request publishes scheduled drafts for `${{ steps.resolve_date.outputs.date }}`.
          add-paths: |
            _posts/
            _drafts/

      - name: Merge pull request
        if: steps.publish.outputs.changed == 'true' && steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --merge "${{ steps.create_pr.outputs.pull-request-number }}"

      - name: Summary
        run: |
          echo "### Publish run: ${{ steps.resolve_date.outputs.date }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/publish-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
