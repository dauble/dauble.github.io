name: Generate Post Hero Images

# Triggers:
#   1. Automatically when any file is added/changed inside _drafts/
#   2. Manually from the Actions tab with an optional single-slug override
on:
  push:
    branches: [master]
    paths:
      - "_drafts/**.md"
  workflow_dispatch:
    inputs:
      post_slug:
        description: >
          Draft slug to generate (e.g. enterprise-architecture-for-developers-what-it-is).
          Leave blank to generate all missing images.
        required: false
        default: ""

permissions:
  contents: write # needed to commit generated images back to the repo
  pull-requests: write # needed to create pull requests

jobs:
  generate-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate images
        env:
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.post_slug }}" ]; then
            python3 scripts/generate-post-images.py "${{ github.event.inputs.post_slug }}"
          else
            python3 scripts/generate-post-images.py
          fi

      - name: Create Pull Request for generated images
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          branch: generated-post-images-${{ github.run_id }}
          base: master
          title: "chore: add AI-generated hero images for draft posts"
          commit-message: "chore: add AI-generated hero images for draft posts"
          body: |
            This pull request adds images automatically generated for draft posts.
          add-paths: |
            assets/images/posts/
            _drafts/
